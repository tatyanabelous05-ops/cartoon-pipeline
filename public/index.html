<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartoon Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --border2: #3a3a3f;
    --text: #f0f0ee;
    --muted: #888884;
    --accent: #c8f060;
    --accent2: #60d0f0;
    --warn: #f0b060;
    --danger: #f06060;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  .header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 0.08em; }
  .logo span { color: var(--muted); }

  .main { max-width: 900px; margin: 0 auto; padding: 40px 32px; }

  .step { margin-bottom: 32px; }
  .step-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .step-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  input[type="text"], textarea {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px;
    outline: none; transition: border-color 0.2s; width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--border2); }
  textarea { resize: vertical; line-height: 1.7; }

  .chars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 12px; }
  .char-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; position: relative; }
  .char-card.has-image { border-color: var(--border2); }
  .char-photo { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius); margin-bottom: 10px; display: block; }
  .char-photo-placeholder { width: 100%; aspect-ratio: 1; border-radius: var(--radius); margin-bottom: 10px; background: var(--surface2); border: 1px dashed var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 28px; color: var(--muted); transition: all 0.2s; }
  .char-photo-placeholder:hover { border-color: var(--accent); color: var(--accent); }
  .char-name-input { font-size: 13px; padding: 7px 10px; }
  .char-remove { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .char-remove:hover { background: var(--danger); border-color: var(--danger); color: white; }
  .add-char-btn { border: 1px dashed var(--border2); border-radius: var(--radius-lg); padding: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--muted); font-size: 13px; background: transparent; transition: all 0.2s; width: 100%; }
  .add-char-btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn { padding: 10px 20px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--accent); color: #0e0e0f; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text); }
  .btn-outline:hover { border-color: var(--text); }
  .btn-copy { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 6px 12px; font-family: 'DM Mono', monospace; }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy.copied { border-color: var(--accent); color: var(--accent); }

  .progress { display: none; margin-top: 20px; }
  .progress.show { display: block; }
  .progress-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
  .progress-msg { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  .results { display: none; margin-top: 40px; }
  .results.show { display: block; }

  .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .tab { padding: 7px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--muted); font-family: 'DM Mono', monospace; transition: all 0.2s; border: none; background: transparent; }
  .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 28px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-val { font-size: 26px; font-weight: 300; color: var(--accent); font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  .chars-summary { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .char-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 5px 14px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .char-pill img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
  .char-pill-name { color: var(--accent2); font-family: 'DM Mono', monospace; font-size: 12px; }

  .copy-all-row { display: flex; justify-content: flex-end; margin-bottom: 14px; }

  .prompt-list { display: flex; flex-direction: column; gap: 10px; }
  .prompt-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .prompt-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .prompt-item-title { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .badge-kling { background: rgba(96,208,240,0.12); color: var(--accent2); border: 1px solid rgba(96,208,240,0.2); }
  .badge-heygen { background: rgba(240,176,96,0.12); color: var(--warn); border: 1px solid rgba(240,176,96,0.2); }
  .badge-split { background: rgba(200,240,96,0.12); color: var(--accent); border: 1px solid rgba(200,240,96,0.2); }
  .prompt-text { font-size: 13px; color: #c8c8c4; line-height: 1.7; font-family: 'DM Mono', monospace; white-space: pre-wrap; word-break: break-word; }

  .error-box { background: rgba(240,96,96,0.08); border: 1px solid rgba(240,96,96,0.25); border-radius: var(--radius); padding: 14px 16px; color: var(--danger); font-size: 13px; margin-top: 16px; display: none; }
  .error-box.show { display: block; }

  input[type="file"] { display: none; }

  @media (max-width: 600px) {
    .main { padding: 24px 16px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">cartoon<span>/</span>pipeline</div>
</div>

<div class="main">

  <!-- Step 1: Style -->
  <div class="step">
    <div class="step-label">01 — Стиль проекту</div>
    <input type="text" id="projectStyle" placeholder="напр: cinematic 3D animation, photorealistic, anime style, 2D cartoon..." />
  </div>

  <!-- Step 2: Characters -->
  <div class="step">
    <div class="step-label">02 — Персонажі</div>
    <div class="chars-grid" id="charsGrid"></div>
    <button class="add-char-btn" onclick="addChar()">+ Додати персонажа</button>
  </div>

  <!-- Step 3: Script -->
  <div class="step">
    <div class="step-label">03 — Сценарій</div>
    <textarea id="scriptInput" rows="12" placeholder="[Кадр 1 — спальня, ніч] Чоловік тягнеться до дружини в ліжку...&#10;&#10;[Кадр 2 — кухня, вечір] Вони вечеряють разом..."></textarea>
  </div>

  <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">
    Аналізувати сценарій
  </button>

  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-msg" id="progressMsg">Ініціалізація...</div>
  </div>
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="chars-summary" id="charsSummary"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('image')">image prompts</button>
      <button class="tab" onclick="switchTab('video')">video prompts</button>
      <button class="tab" onclick="switchTab('analysis')">аналіз сцен</button>
    </div>

    <div class="tab-content active" id="tab-image">
      <div class="copy-all-row">
        <button class="btn btn-copy" id="copyAllImage" onclick="copyAll('image')">copy all image prompts</button>
      </div>
      <div class="prompt-list" id="imagePrompts"></div>
    </div>

    <div class="tab-content" id="tab-video">
      <div class="copy-all-row">
        <button class="btn btn-copy" id="copyAllVideo" onclick="copyAll('video')">copy all video prompts</button>
      </div>
      <div class="prompt-list" id="videoPrompts"></div>
    </div>

    <div class="tab-content" id="tab-analysis">
      <div class="prompt-list" id="analysisItems"></div>
    </div>
  </div>

</div>

<script>
let chars = [];
let analysisResult = null;
let charIdCounter = 0;

function addChar() {
  const id = ++charIdCounter;
  chars.push({ id, name: '', imageB64: null });
  renderChars();
}

function removeChar(id) {
  chars = chars.filter(c => c.id !== id);
  renderChars();
}

function renderChars() {
  const grid = document.getElementById('charsGrid');
  grid.innerHTML = '';
  chars.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-card' + (c.imageB64 ? ' has-image' : '');
    div.innerHTML = `
      <button class="char-remove" onclick="removeChar(${c.id})">×</button>
      ${c.imageB64
        ? `<img class="char-photo" src="${c.imageB64}" />`
        : `<div class="char-photo-placeholder" onclick="triggerUpload(${c.id})">+</div>`
      }
      <input class="char-name-input" type="text" placeholder="Роль (напр: чоловік)" value="${c.name}"
        oninput="updateCharName(${c.id}, this.value)" />
      <input type="file" id="file-${c.id}" accept="image/*" onchange="handleImage(${c.id}, this)" />
    `;
    grid.appendChild(div);
  });
}

function triggerUpload(id) {
  document.getElementById('file-' + id)?.click();
}

function updateCharName(id, val) {
  const c = chars.find(x => x.id === id);
  if (c) c.name = val;
}

function handleImage(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const c = chars.find(x => x.id === id);
    if (c) { c.imageB64 = e.target.result; renderChars(); }
  };
  reader.readAsDataURL(file);
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressMsg').textContent = msg;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['image','video','analysis'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(tc => {
    tc.classList.toggle('active', tc.id === 'tab-' + name);
  });
}

function copyAll(type) {
  if (!analysisResult) return;
  const text = analysisResult.scenes.map(s => {
    const content = type === 'image' ? s.image_prompt : (s.is_heygen ? s.heygen_notes : s.video_prompt);
    return `=== Scene ${s.number}: ${s.location} ===\n${content || ''}`;
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(type === 'image' ? 'copyAllImage' : 'copyAllVideo');
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function copyPrompt(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

async function analyze() {
  const script = document.getElementById('scriptInput').value.trim();
  const style = document.getElementById('projectStyle').value.trim() || 'cinematic photorealistic animation';
  if (!script) return;

  document.getElementById('errorBox').className = 'error-box';
  document.getElementById('results').className = 'results';
  document.getElementById('progress').className = 'progress show';
  document.getElementById('analyzeBtn').disabled = true;
  setProgress(10, 'Підготовка запиту...');

  const charsWithImages = chars.filter(c => c.name);
  let charDescSection = charsWithImages.length > 0
    ? '\n\nCHARACTER REFERENCES:\n' + charsWithImages.map(c => `- Role: "${c.name}" ${c.imageB64 ? '(image attached)' : ''}`).join('\n')
    : '';

  const systemPrompt = `You are a JSON API. You must respond with ONLY a valid JSON object. No explanations, no apologies, no markdown, no backticks, no text before or after the JSON. If you cannot process something, still return the JSON with your best effort. Never write "I'm sorry" or any other text.

Animation project style: "${style}"${charDescSection}

Return this exact JSON structure:
{
  "characters": [
    {"role": "role name", "alias": "short English alias", "visual": "detailed visual description from the reference image: hair color/style, face features, approximate age, body type, typical clothing style"}
  ],
  "scenes": [
    {
      "number": 1,
      "location": "location in Ukrainian",
      "time": "time of day in Ukrainian",
      "characters_present": ["alias1"],
      "action": "brief action description in Ukrainian",
      "dialogue": "all dialogue lines verbatim from this scene",
      "is_heygen": false,
      "should_split": false,
      "split_reason": "",
      "image_prompt": "Detailed English prompt. Start with '${style}'. Describe: exact setting with lighting and atmosphere, each character by their visual description (NOT role name), positions, expressions, camera angle. 3-5 sentences.",
      "video_prompt": "Kling AI English prompt. Describe motion/action. Then include ALL dialogue: [DIALOGUE: Character: 'line']. 2-3 sentences.",
      "heygen_notes": "If is_heygen: describe monologue delivery, emotion, pacing, character appearance"
    }
  ],
  "total_scenes": 0,
  "heygen_count": 0,
  "split_count": 0
}

Rules:
- is_heygen = true only if one character speaks 3+ consecutive sentences
- should_split = true if scene has very distinct location changes
- Describe characters in prompts by visual appearance only, never by role name
- Always include actual dialogue text in video_prompt
- Return ONLY the JSON, nothing else`;

  const parts = [{ text: systemPrompt + '\n\nSCREENPLAY:\n' + script }];

  charsWithImages.forEach(c => {
    if (c.imageB64) {
      const b64 = c.imageB64.split(',')[1];
      const mimeMatch = c.imageB64.match(/data:([^;]+);/);
      const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
      parts.push({ text: `Reference image for character role: "${c.name}"` });
      parts.push({ inline_data: { mime_type: mime, data: b64 } });
    }
  });

  setProgress(30, 'Надсилаємо до Gemini...');

  try {
    const images = charsWithImages
      .filter(c => c.imageB64)
      .map(c => ({ role: c.name, data: c.imageB64 }));

    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt,
        userText: 'SCREENPLAY:\n' + script + (images.length ? '\n\nCharacter reference images are attached.' : ''),
        images
      })
    });

    setProgress(70, 'Отримуємо відповідь...');

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Server error');

    const raw = data.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();

    setProgress(90, 'Парсимо результат...');
    analysisResult = JSON.parse(clean);
    renderResults(analysisResult);

    setProgress(100, 'Готово!');
    setTimeout(() => {
      document.getElementById('progress').className = 'progress';
      document.getElementById('results').className = 'results show';
    }, 400);

  } catch (e) {
    document.getElementById('progress').className = 'progress';
    const eb = document.getElementById('errorBox');
    eb.className = 'error-box show';
    eb.textContent = 'Помилка: ' + e.message;
  }

  document.getElementById('analyzeBtn').disabled = false;
}

function renderResults(d) {
  document.getElementById('summaryGrid').innerHTML = [
    ['Сцен всього', d.total_scenes],
    ['Персонажів', d.characters.length],
    ['→ HeyGen', d.heygen_count],
    ['Розбити', d.split_count],
  ].map(([l, v]) => `<div class="stat"><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div>`).join('');

  document.getElementById('charsSummary').innerHTML = d.characters.map(c => {
    const cd = chars.find(x => x.name.toLowerCase() === c.role.toLowerCase());
    const imgTag = cd?.imageB64
      ? `<img src="${cd.imageB64}" />`
      : `<span style="width:22px;height:22px;border-radius:50%;background:var(--surface2);display:inline-block;vertical-align:middle;"></span>`;
    return `<div class="char-pill">${imgTag}<span class="char-pill-name">${c.alias}</span><span style="font-size:12px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.visual}</span></div>`;
  }).join('');

  const imgList = document.getElementById('imagePrompts');
  const vidList = document.getElementById('videoPrompts');
  const anList = document.getElementById('analysisItems');
  imgList.innerHTML = '';
  vidList.innerHTML = '';
  anList.innerHTML = '';

  d.scenes.forEach(s => {
    const badges = [
      s.is_heygen ? '<span class="badge badge-heygen">HeyGen</span>' : '<span class="badge badge-kling">Kling</span>',
      s.should_split ? '<span class="badge badge-split">split</span>' : ''
    ].join('');

    const title = `scene_${String(s.number).padStart(2,'0')} · ${s.location} · ${s.time}`;

    const makeItem = (promptText, promptId) => {
      const div = document.createElement('div');
      div.className = 'prompt-item';
      div.innerHTML = `
        <div class="prompt-item-header">
          <div class="prompt-item-title">${title} ${badges}</div>
          <button class="btn btn-copy" onclick="copyPrompt(this, 'p-${promptId}')">copy</button>
        </div>
        <div class="prompt-text" id="p-${promptId}">${promptText || ''}</div>
      `;
      return div;
    };

    imgList.appendChild(makeItem(s.image_prompt, `img-${s.number}`));
    vidList.appendChild(makeItem(s.is_heygen ? s.heygen_notes : s.video_prompt, `vid-${s.number}`));

    const anDiv = document.createElement('div');
    anDiv.className = 'prompt-item';
    anDiv.innerHTML = `
      <div class="prompt-item-header">
        <div class="prompt-item-title">${title} ${badges}</div>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">Персонажі: ${s.characters_present.join(', ')}</div>
      <div style="font-size:13px;color:var(--text);margin-bottom:6px;">${s.action}</div>
      ${s.dialogue ? `<div style="font-size:13px;color:var(--accent2);font-style:italic;white-space:pre-wrap;">${s.dialogue}</div>` : ''}
      ${s.should_split ? `<div style="font-size:12px;color:var(--accent);margin-top:8px;">⚠ ${s.split_reason}</div>` : ''}
    `;
    anList.appendChild(anDiv);
  });
}

// Init
window.onload = () => { addChar(); addChar(); };
</script>
</body>
</html>
